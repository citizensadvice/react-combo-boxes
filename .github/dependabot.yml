version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      # Group everything except major version updates
      # and security vulnerabilities together
      regular-updates:
        update-types:
          - 'minor'
          - 'patch'
      # Must be updated together
      react:
        patterns:
          - 'react'
          - 'react-dom'
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 7
